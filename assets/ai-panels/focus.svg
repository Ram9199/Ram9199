<svg width="880" height="310" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F7FF"/><stop offset="100%" stop-color="#6C2BD9"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="878" height="308" rx="18" fill="#0b1220" stroke="url(#g)" stroke-width="2"/>
  <text x="30" y="50" font-family="Orbitron,Segoe UI,Arial" font-size="22" font-weight="bold" fill="#9BE8FF">Focus</text>
  <rect x="28" y="64" width="824" height="2" fill="url(#g)"/>
  <!-- Bullet 1 -->
  <text x="28" y="92" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#00F7FF" font-weight="bold">&#x25B8; Prompt Engineering Framework for Multi-Agent RAG</text>
  <text x="40" y="112" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#CFEFFF">Refine agent roles and communication protocols for improved knowledge synthesis.</text>
  <text x="40" y="129" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#CFEFFF">Target 90% successful knowledge retrieval in benchmark tests.</text>
  <!-- Bullet 2 -->
  <text x="28" y="158" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#00F7FF" font-weight="bold">&#x25B8; Trust Metrics within Orchestration Layer</text>
  <text x="40" y="178" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#CFEFFF">Integrate explainability mechanisms and error detection for each agent.</text>
  <text x="40" y="195" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#CFEFFF">Aim for a 20% increase in verifiable agent output accuracy.</text>
  <!-- Bullet 3 -->
  <text x="28" y="224" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#00F7FF" font-weight="bold">&#x25B8; Adversarial Testing Plan for Robustness</text>
  <text x="40" y="244" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#CFEFFF">Identify attack vectors and design tests for vulnerability assessment.</text>
  <text x="40" y="261" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#CFEFFF">Prioritize safeguarding against bias and misinformation.</text>
</svg>
