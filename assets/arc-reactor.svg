<?xml version="1.0" encoding="UTF-8"?>
<svg width="720" height="720" viewBox="0 0 720 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Arc reactor core">
  <title>Arc Reactor Core</title>
  <defs>
    <radialGradient id="background" cx="50%" cy="50%" r="62%">
      <stop offset="0%" stop-color="#09213a"/>
      <stop offset="54%" stop-color="#030914"/>
      <stop offset="100%" stop-color="#00030a"/>
    </radialGradient>

    <radialGradient id="cyanGlass" cx="50%" cy="45%" r="64%">
      <stop offset="0%" stop-color="#e8ffff"/>
      <stop offset="28%" stop-color="#74f5ff"/>
      <stop offset="68%" stop-color="#15c8ff"/>
      <stop offset="100%" stop-color="#0873c2"/>
    </radialGradient>

    <linearGradient id="panelSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ccffff" stop-opacity=".92"/>
      <stop offset="46%" stop-color="#2be6ff" stop-opacity=".92"/>
      <stop offset="100%" stop-color="#006fc8" stop-opacity=".9"/>
    </linearGradient>

    <filter id="outerGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="9" result="blur1"/>
      <feGaussianBlur stdDeviation="24" result="blur2"/>
      <feGaussianBlur stdDeviation="44" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softPanelGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="reactorClip">
      <circle cx="360" cy="360" r="278"/>
    </clipPath>

    <style><![CDATA[
      .core-glow {
        animation: corePulse 2.7s ease-in-out infinite;
        transform-origin: 360px 360px;
      }

      .panel {
        filter: url(#softPanelGlow);
        animation: panelBreath 4s ease-in-out infinite;
      }

      .panel:nth-of-type(2n) { animation-delay: .35s; }
      .panel:nth-of-type(3n) { animation-delay: .7s; }

      @keyframes corePulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: .82; transform: scale(.985); }
      }

      @keyframes panelBreath {
        0%, 100% { opacity: .94; }
        50% { opacity: .78; }
      }

      @media (prefers-reduced-motion: reduce) {
        .core-glow, .panel { animation: none; }
      }
    ]]></style>
  </defs>

  <rect width="720" height="720" fill="url(#background)"/>

  <g filter="url(#outerGlow)">
    <circle cx="360" cy="360" r="301" fill="#020914"/>
    <circle class="core-glow" cx="360" cy="360" r="284" fill="url(#cyanGlass)" opacity=".72"/>
    <circle cx="360" cy="360" r="286" fill="none" stroke="#48e9ff" stroke-width="11" opacity=".9"/>
    <circle cx="360" cy="360" r="259" fill="none" stroke="#07111d" stroke-width="22" opacity=".92"/>
  </g>

  <g clip-path="url(#reactorClip)">
    <rect x="70" y="70" width="580" height="580" fill="#06101d"/>

    <g fill="url(#panelSheen)" stroke="#45efff" stroke-width="3" stroke-linejoin="round" opacity=".96">
      <path class="panel" d="M236 151 Q360 112 484 151 L455 232 L265 232 Z"/>
      <path class="panel" d="M190 264 L530 264 L493 322 L227 322 Z"/>
      <path class="panel" d="M95 325 Q118 235 190 177 L222 305 L178 450 Z"/>
      <path class="panel" d="M625 325 Q602 235 530 177 L498 305 L542 450 Z"/>
      <path class="panel" d="M112 498 Q178 597 304 628 L281 469 L203 354 Z"/>
      <path class="panel" d="M608 498 Q542 597 416 628 L439 469 L517 354 Z"/>
      <path class="panel" d="M293 352 L427 352 L360 493 Z"/>
      <path class="panel" d="M316 616 L404 616 L360 518 Z" opacity=".88"/>
    </g>

    <g fill="none" stroke="#030914" stroke-linecap="round" stroke-linejoin="round" opacity=".97">
      <path d="M215 247 L505 247" stroke-width="30"/>
      <path d="M245 324 L306 506" stroke-width="34"/>
      <path d="M475 324 L414 506" stroke-width="34"/>
      <path d="M360 500 L360 628" stroke-width="28"/>
      <path d="M268 247 L222 136" stroke-width="30"/>
      <path d="M452 247 L498 136" stroke-width="30"/>
      <path d="M180 177 L232 322" stroke-width="30"/>
      <path d="M540 177 L488 322" stroke-width="30"/>
      <path d="M190 470 L296 628" stroke-width="28"/>
      <path d="M530 470 L424 628" stroke-width="28"/>
    </g>

    <g fill="none" stroke="#7df7ff" stroke-linecap="round" opacity=".45">
      <path d="M257 165 Q360 135 463 165" stroke-width="8"/>
      <path d="M214 279 L506 279" stroke-width="7"/>
      <path d="M315 371 L405 371" stroke-width="7"/>
      <path d="M316 603 L404 603" stroke-width="5"/>
    </g>
  </g>

  <g filter="url(#outerGlow)">
    <circle cx="360" cy="360" r="289" fill="none" stroke="#001728" stroke-width="22"/>
    <circle cx="360" cy="360" r="282" fill="none" stroke="#54efff" stroke-width="5" opacity=".85"/>
    <circle cx="360" cy="360" r="308" fill="none" stroke="#0aaeea" stroke-width="2" opacity=".55"/>
  </g>

  <circle cx="360" cy="360" r="328" fill="none" stroke="#02101d" stroke-width="36" opacity=".9"/>
</svg>
