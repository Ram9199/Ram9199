<?xml version="1.0" encoding="UTF-8"?>
<svg width="720" height="720" viewBox="0 0 720 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated arc reactor core">
  <title>Animated Arc Reactor Core</title>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#062a35"/>
      <stop offset="45%" stop-color="#071923"/>
      <stop offset="100%" stop-color="#03070d"/>
    </radialGradient>

    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="22%" stop-color="#d8ffff"/>
      <stop offset="55%" stop-color="#50f5ff"/>
      <stop offset="100%" stop-color="#00a8d7"/>
    </radialGradient>

    <linearGradient id="cyanSteel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8ffff"/>
      <stop offset="35%" stop-color="#35e8ff"/>
      <stop offset="70%" stop-color="#116b86"/>
      <stop offset="100%" stop-color="#06141c"/>
    </linearGradient>

    <linearGradient id="hotArc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#72f8ff"/>
      <stop offset="100%" stop-color="#00a6ff"/>
    </linearGradient>

    <filter id="deepGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="5" result="blur1"/>
      <feGaussianBlur stdDeviation="16" result="blur2"/>
      <feGaussianBlur stdDeviation="34" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="fineGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="innerCut">
      <circle cx="360" cy="360" r="268"/>
    </clipPath>

    <style><![CDATA[
      .spin-a { transform-origin: 360px 360px; animation: spin 24s linear infinite; }
      .spin-b { transform-origin: 360px 360px; animation: spin 11s linear reverse infinite; }
      .spin-c { transform-origin: 360px 360px; animation: spin 7s linear infinite; }
      .pulse { transform-origin: 360px 360px; animation: pulse 2.4s ease-in-out infinite; }
      .spark { transform-origin: 360px 360px; animation: spark 1.9s ease-in-out infinite; }
      .spark.delay-1 { animation-delay: .35s; }
      .spark.delay-2 { animation-delay: .7s; }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: .78; transform: scale(.965); }
      }

      @keyframes spark {
        0%, 100% { opacity: .22; stroke-dashoffset: 0; }
        45% { opacity: 1; }
        70% { opacity: .45; stroke-dashoffset: -120; }
      }

      @media (prefers-reduced-motion: reduce) {
        .spin-a, .spin-b, .spin-c, .pulse, .spark { animation: none; }
      }
    ]]></style>
  </defs>

  <rect width="720" height="720" fill="url(#bg)"/>

  <g filter="url(#deepGlow)">
    <circle cx="360" cy="360" r="310" fill="none" stroke="#01394a" stroke-width="28"/>
    <circle cx="360" cy="360" r="292" fill="none" stroke="#0ee9ff" stroke-width="3" opacity=".75"/>
    <circle cx="360" cy="360" r="258" fill="none" stroke="#50f5ff" stroke-width="2" opacity=".35"/>
  </g>

  <g class="spin-a" clip-path="url(#innerCut)" opacity=".94">
    <g transform="translate(360 360)">
      <g fill="url(#cyanSteel)" filter="url(#fineGlow)">
        <path d="M0 -254 L24 -144 L-24 -144 Z"/>
        <path d="M0 254 L24 144 L-24 144 Z"/>
        <path d="M254 0 L144 24 L144 -24 Z"/>
        <path d="M-254 0 L-144 24 L-144 -24 Z"/>
        <g transform="rotate(45)">
          <path d="M0 -254 L24 -144 L-24 -144 Z"/>
          <path d="M0 254 L24 144 L-24 144 Z"/>
          <path d="M254 0 L144 24 L144 -24 Z"/>
          <path d="M-254 0 L-144 24 L-144 -24 Z"/>
        </g>
        <g transform="rotate(22.5)" opacity=".75">
          <path d="M0 -242 L14 -176 L-14 -176 Z"/>
          <path d="M0 242 L14 176 L-14 176 Z"/>
          <path d="M242 0 L176 14 L176 -14 Z"/>
          <path d="M-242 0 L-176 14 L-176 -14 Z"/>
        </g>
        <g transform="rotate(67.5)" opacity=".75">
          <path d="M0 -242 L14 -176 L-14 -176 Z"/>
          <path d="M0 242 L14 176 L-14 176 Z"/>
          <path d="M242 0 L176 14 L176 -14 Z"/>
          <path d="M-242 0 L-176 14 L-176 -14 Z"/>
        </g>
      </g>
    </g>
  </g>

  <g class="spin-b" fill="none" stroke-linecap="round" filter="url(#fineGlow)">
    <circle cx="360" cy="360" r="238" stroke="#72f8ff" stroke-width="12" stroke-dasharray="18 22" opacity=".72"/>
    <circle cx="360" cy="360" r="206" stroke="#d8ffff" stroke-width="4" stroke-dasharray="4 15" opacity=".82"/>
  </g>

  <g class="spin-c" transform="translate(360 360)" stroke="url(#hotArc)" stroke-linecap="round" filter="url(#deepGlow)">
    <g opacity=".9">
      <line x1="0" y1="-286" x2="0" y2="-252" stroke-width="7"/>
      <line x1="0" y1="286" x2="0" y2="252" stroke-width="7"/>
      <line x1="-286" y1="0" x2="-252" y2="0" stroke-width="7"/>
      <line x1="286" y1="0" x2="252" y2="0" stroke-width="7"/>
    </g>
    <g transform="rotate(30)" opacity=".68">
      <line x1="0" y1="-284" x2="0" y2="-260" stroke-width="5"/>
      <line x1="0" y1="284" x2="0" y2="260" stroke-width="5"/>
      <line x1="-284" y1="0" x2="-260" y2="0" stroke-width="5"/>
      <line x1="284" y1="0" x2="260" y2="0" stroke-width="5"/>
    </g>
    <g transform="rotate(60)" opacity=".68">
      <line x1="0" y1="-284" x2="0" y2="-260" stroke-width="5"/>
      <line x1="0" y1="284" x2="0" y2="260" stroke-width="5"/>
      <line x1="-284" y1="0" x2="-260" y2="0" stroke-width="5"/>
      <line x1="284" y1="0" x2="260" y2="0" stroke-width="5"/>
    </g>
  </g>

  <g fill="none" stroke-linecap="round" filter="url(#deepGlow)">
    <circle class="spark" cx="360" cy="360" r="150" stroke="#ffffff" stroke-width="4" stroke-dasharray="72 430"/>
    <circle class="spark delay-1" cx="360" cy="360" r="174" stroke="#70f7ff" stroke-width="5" stroke-dasharray="110 510"/>
    <circle class="spark delay-2" cx="360" cy="360" r="196" stroke="#00b7ff" stroke-width="3" stroke-dasharray="48 360"/>
  </g>

  <g class="pulse" filter="url(#deepGlow)">
    <circle cx="360" cy="360" r="122" fill="url(#core)"/>
    <circle cx="360" cy="360" r="98" fill="none" stroke="#ffffff" stroke-width="5" opacity=".82"/>
    <circle cx="360" cy="360" r="63" fill="#eaffff" opacity=".92"/>
    <circle cx="360" cy="360" r="32" fill="#ffffff"/>
  </g>

  <g fill="none" stroke="#bafcff" stroke-linecap="round" opacity=".56">
    <circle cx="360" cy="360" r="134" stroke-width="2"/>
    <circle cx="360" cy="360" r="222" stroke-width="2"/>
    <path d="M360 78 A282 282 0 0 1 642 360" stroke-width="4"/>
    <path d="M78 360 A282 282 0 0 1 360 78" stroke-width="4"/>
    <path d="M360 642 A282 282 0 0 1 78 360" stroke-width="4"/>
    <path d="M642 360 A282 282 0 0 1 360 642" stroke-width="4"/>
  </g>
</svg>
