name: Metrics
on:
  schedule: [{cron: "0 3 * * *"}]
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  actions: read

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate 3D Contribution Graph
        uses: yoshi3893/github-profile-3d-contrib@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: .github/config/profile-3d.json

      - name: Render Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: Ram9199
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Los_Angeles
          config_display: large
          
          # Plugins
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, less
          plugin_languages_details: bytes-size, percentage
          plugin_languages_threshold: 2%
          plugin_languages_colors: github
          
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          plugin_activity: yes
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_days: 14
          
          plugin_followup: yes
          plugin_followup_sections: repositories
          
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_lines_repositories_limit: 4
          
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: mastered
          
          plugin_stargazers: yes
          plugin_stargazers_charts_type: classic
          
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 6
          
          plugin_repositories: yes
          plugin_repositories_featured: Ram9199/ram-ai-orchestrator,Ram9199/healthcare-rag,Ram9199/lluvia-os

      - name: Commit 3D Graph
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/
          git diff --staged --quiet || git commit -m "chore: update 3D contribution graph [skip ci]"
          git push
